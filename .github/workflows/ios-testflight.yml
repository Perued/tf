name: Upload Signed IPA To TestFlight
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  upload-ipa:
    runs-on: macos-latest
    steps:
      # 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 查看文件
      - name: Debug files
        run: |
          pwd
          ls -lah
          file app.ipa || true

      # 还原签名证书
      - name: Restore signing certificate
        run: |
          echo "${{ secrets.SIGNING_CERT_P12 }}" | base64 --decode > cert.p12

      # 还原描述文件
      - name: Restore provisioning profile
        run: |
          echo "${{ secrets.SIGNING_PROFILE }}" | base64 --decode > profile.mobileprovision

      # 安装 fastlane
      - name: Install fastlane
        run: gem install fastlane --no-document

      # 导入证书到钥匙串
      - name: Import certificate to keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 \
            -k build.keychain \
            -P "${{ secrets.SIGNING_CERT_P12_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain

      # 修改 Bundle ID / 删除手表组件 / 删除 PlugIns / 删除后台模式
      - name: Patch IPA
        env:
          TARGET_BUNDLE_ID: ${{ secrets.TARGET_BUNDLE_ID }}
        run: |
          unzip -q app.ipa -d ipa_work
          APP_PATH=$(find ipa_work/Payload -name "*.app" -maxdepth 1 -type d)
          echo "App path: $APP_PATH"

          # ───── 修复 MinimumOSVersion ─────
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 9.0" "$APP_PATH/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 9.0" "$APP_PATH/Info.plist"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$APP_PATH/Info.plist")"

          # ───── 修改 Bundle ID ─────
          OLD_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "原 Bundle ID: $OLD_BUNDLE_ID"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${TARGET_BUNDLE_ID}" "$APP_PATH/Info.plist"
          echo "新 Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"

          # ───── 删除 Required background modes ─────
          echo "===== 删除 UIBackgroundModes ====="
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" "$APP_PATH/Info.plist" 2>/dev/null \
            && echo "已删除 UIBackgroundModes" \
            || echo "UIBackgroundModes 不存在，跳过"

          # ───── 删除手表组件 ─────
          echo "===== 删除手表组件 ====="
          if [ -d "$APP_PATH/Watch" ]; then
            rm -rf "$APP_PATH/Watch"
            echo "已删除 Watch/ 目录"
          else
            echo "Watch/ 目录不存在，跳过"
          fi

          # ───── 删除整个 PlugIns 目录 ─────
          echo "===== 删除 PlugIns 目录 ====="
          if [ -d "$APP_PATH/PlugIns" ]; then
            rm -rf "$APP_PATH/PlugIns"
            echo "已删除 PlugIns/ 目录"
          else
            echo "PlugIns/ 目录不存在，跳过"
          fi

          # ───── 清理 Info.plist 手表相关声明 ─────
          /usr/libexec/PlistBuddy -c "Delete :WKCompanionAppBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null && echo "已删除 WKCompanionAppBundleIdentifier" || true
          /usr/libexec/PlistBuddy -c "Delete :WKWatchKitApp" "$APP_PATH/Info.plist" 2>/dev/null && echo "已删除 WKWatchKitApp" || true

          # ───── 重新打包 ─────
          cd ipa_work && zip -qr ../app_patched.ipa Payload && cd ..
          echo "===== Patch 完成 ====="

      # 用 fastlane 重签名
      - name: Sign IPA
        run: |
          fastlane run resign \
            ipa:app_patched.ipa \
            signing_identity:"${{ secrets.SIGNING_IDENTITY }}" \
            provisioning_profile:profile.mobileprovision \
            output_path:signed.ipa

      # 验证签名结果
      - name: Verify signed IPA
        run: |
          echo "===== SIGNED IPA ====="
          ls -lah signed.ipa

      # 创建 API Key JSON
      - name: Create API Key JSON
        run: |
          cat > api_key.json <<EOF
          {
            "key_id": "${{ secrets.ASC_KEY_ID }}",
            "issuer_id": "${{ secrets.ASC_ISSUER_ID }}",
            "key": "${{ secrets.APP_STORE_CONNECT_API_KEY }}",
            "in_house": false
          }
          EOF

      # 上传到 TestFlight
      - name: Upload IPA
        run: |
          fastlane pilot upload \
            --ipa signed.ipa \
            --api_key_path api_key.json \
            --skip_waiting_for_build_processing true

      # 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-ipa
          path: signed.ipa
