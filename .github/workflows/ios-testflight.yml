name: Upload Signed IPA To TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload-ipa:
    runs-on: macos-latest

    steps:
      # 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 查看文件
      - name: Debug files
        run: |
          pwd
          echo "===== ROOT FILES ====="
          ls -lah
          file app.ipa || true

      # 安装 fastlane
      - name: Install fastlane
        run: |
          brew install fastlane

      # 恢复 App Store Connect API Key
      - name: Restore API Key
        run: |
          echo '${{ secrets.APP_STORE_CONNECT_API_KEY }}' > AuthKey.p8

      # 上传 IPA 到 TestFlight
      - name: Upload IPA
        run: |
          fastlane pilot upload \
            --ipa app.ipa \
            --api_key_path AuthKey.p8 \
            --api_key_key_id "${{ secrets.ASC_KEY_ID }}" \
            --api_key_issuer_id "${{ secrets.ASC_ISSUER_ID }}" \
            --skip_waiting_for_build_processing true

      # 上传 IPA Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-ipa
          path: app.ipa
