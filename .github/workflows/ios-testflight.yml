name: iOS TestFlight Upload

on:
  push:
    branches:
      - main

jobs:
  upload-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1

      - name: Install Bundler and gems
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY" > AuthKey.json

      - name: Debug: list repo and fastlane
        run: |
          pwd
          echo '--- root files ---'
          ls -la
          echo '--- fastlane dir ---'
          ls -la fastlane || true
          echo '--- Fastfile preview ---'
          sed -n '1,120p' fastlane/Fastfile || true
          echo '--- ipa files ---'
          ls -la *.ipa || ls -la ipa || true

      - name: Upload IPA to TestFlight
        env:
          IPA_PATH: app.ipa
        run: |
          export FASTLANE_SKIP_UPDATE_CHECK=1
          export FASTLANE_VERBOSE=1
          export FASTLANE_DEBUG=1
          bundle exec fastlane upload_ipa 2>&1 | tee fastlane.log

      - name: Upload fastlane logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: fastlane.log

      - name: Debug: show tail of fastlane.log
        if: always()
        run: |
          echo '--- fastlane.log (last 200 lines) ---'
          tail -n 200 fastlane.log || true
