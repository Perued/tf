name: Auto Sign And Upload TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload-ipa:
    runs-on: macos-latest

    steps:

      # Checkout repository with Git LFS
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Debug repository files
      - name: Debug repository files
        run: |
          pwd
          echo "===== ROOT FILES ====="
          ls -lah

      # Restore signing certificate
      - name: Restore signing certificate
        run: |
          echo "${{ secrets.SIGNING_CERT_P12 }}" | base64 --decode > cert.p12

      # Restore provisioning profile
      - name: Restore provisioning profile
        run: |
          echo "${{ secrets.SIGNING_PROFILE }}" | base64 --decode > profile.mobileprovision

      # Restore App Store Connect API key
      - name: Restore App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > AuthKey.p8

      # Install zsign
      - name: Install zsign
        run: |
          brew install openssl@3 pkg-config

          git clone https://github.com/zhlynn/zsign.git

          cd zsign/build/macos

          make

          sudo cp ../../bin/zsign /usr/local/bin/

          sudo chmod +x /usr/local/bin/zsign

          zsign -v

      # Verify files
      - name: Verify files
        run: |
          echo "===== FILE CHECK ====="

          ls -lah

          file app.ipa || true
          file cert.p12 || true
          file profile.mobileprovision || true
          file AuthKey.p8 || true

      # Re-sign IPA
      - name: Sign IPA
        run: |
          zsign \
            -k cert.p12 \
            -p "${{ secrets.SIGNING_CERT_P12_PASSWORD }}" \
            -m profile.mobileprovision \
            -o signed.ipa \
            app.ipa

      # Verify signed IPA
      - name: Verify signed IPA
        run: |
          echo "===== SIGNED IPA ====="

          ls -lah signed.ipa

      # Create API Key JSON
      - name: Create API Key JSON
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > api_key.json <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key_filepath": "$(pwd)/AuthKey.p8",
            "in_house": false
          }
          EOF

          echo "===== API KEY JSON ====="
          cat api_key.json

      # Install latest fastlane
      - name: Install latest fastlane
        run: |
          gem install fastlane

      # Upload to TestFlight
      - name: Upload to TestFlight
        run: |
          fastlane pilot upload \
            --ipa signed.ipa \
            --api_key_path api_key.json \
            --skip_waiting_for_build_processing true

      # Upload artifact
      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-ipa
          path: signed.ipa
