name: Upload Signed IPA To TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload-ipa:
    runs-on: macos-latest

    steps:
      # 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 查看文件
      - name: Debug files
        run: |
          pwd
          ls -lah
          file app.ipa || true

      # 安装 fastlane
      - name: Install fastlane
        run: |
          brew install fastlane

      # 创建 API Key JSON
      - name: Create API Key JSON
        run: |
          cat > api_key.json <<EOF
          {
            "key_id": "${{ secrets.ASC_KEY_ID }}",
            "issuer_id": "${{ secrets.ASC_ISSUER_ID }}",
            "key": "${{ secrets.APP_STORE_CONNECT_API_KEY }}",
            "in_house": false
          }
          EOF

      # 上传 IPA
      - name: Upload IPA
        run: |
          fastlane pilot upload \
            --ipa app.ipa \
            --api_key_path api_key.json \
            --skip_waiting_for_build_processing true

      # 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-ipa
          path: app.ipa
