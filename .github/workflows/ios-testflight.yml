name: Upload Signed IPA To TestFlight
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  upload-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Debug files
        run: |
          pwd
          ls -lah
          file app.ipa || true

      - name: Restore signing certificate
        run: |
          echo "${{ secrets.SIGNING_CERT_P12 }}" | base64 --decode > cert.p12

      - name: Restore provisioning profile
        run: |
          echo "${{ secrets.SIGNING_PROFILE }}" | base64 --decode > profile.mobileprovision

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Import certificate to keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 \
            -k build.keychain \
            -P "${{ secrets.SIGNING_CERT_P12_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain

      - name: Patch IPA
        env:
          TARGET_BUNDLE_ID: ${{ secrets.TARGET_BUNDLE_ID }}
        run: |
          unzip -q app.ipa -d ipa_work
          APP_PATH=$(find ipa_work/Payload -name "*.app" -maxdepth 1 -type d)
          echo "App path: $APP_PATH"

          # 修复 MinimumOSVersion
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 9.0" "$APP_PATH/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 9.0" "$APP_PATH/Info.plist"
          echo "MinimumOSVersion: $(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$APP_PATH/Info.plist")"

          # 修改 Bundle ID
          OLD_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "原 Bundle ID: $OLD_BUNDLE_ID"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${TARGET_BUNDLE_ID}" "$APP_PATH/Info.plist"
          echo "新 Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"

          # 删除 UIBackgroundModes
          echo "===== 删除 UIBackgroundModes ====="
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" "$APP_PATH/Info.plist" 2>/dev/null \
            && echo "已删除 UIBackgroundModes" \
            || echo "UIBackgroundModes 不存在，跳过"

          # 删除手表组件
          echo "===== 删除手表组件 ====="
          rm -rf "$APP_PATH/Watch" && echo "已删除 Watch/" || true
          rm -rf "$APP_PATH/PlugIns" && echo "已删除 PlugIns/" || true
          rm -rf "$APP_PATH/com.apple.WatchPlaceholder" && echo "已删除 com.apple.WatchPlaceholder/" || true

          find "$APP_PATH" -mindepth 2 \( \
            -name "*Watch*" -o \
            -name "*WatchKit*" -o \
            -name "*watchkit*" -o \
            -name "*WatchNative*" \
          \) 2>/dev/null | while read item; do
            rm -rf "$item"
            echo "已删除嵌套组件: $item"
          done

          /usr/libexec/PlistBuddy -c "Delete :WKCompanionAppBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null \
            && echo "已删除 WKCompanionAppBundleIdentifier" || true
          /usr/libexec/PlistBuddy -c "Delete :WKWatchKitApp" "$APP_PATH/Info.plist" 2>/dev/null \
            && echo "已删除 WKWatchKitApp" || true

          cd ipa_work && zip -qr ../app_patched.ipa Payload && cd ..
          echo "===== Patch 完成 ====="

      - name: Sign IPA
        run: |
          cp app_patched.ipa signed.ipa
          fastlane run resign \
            ipa:signed.ipa \
            signing_identity:"${{ secrets.SIGNING_IDENTITY }}" \
            provisioning_profile:profile.mobileprovision

      - name: Verify signed IPA
        run: ls -lah signed.ipa

      - name: Create API Key JSON
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # 把 \n 还原为真实换行符
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" \
            | sed 's/\\n/\n/g' > AuthKey_raw.p8

          echo "===== 密钥内容检查 ====="
          head -1 AuthKey_raw.p8

          # 转换为命名曲线格式，修复 OpenSSL 3.x invalid curve name 错误
          openssl pkcs8 -in AuthKey_raw.p8 -nocrypt 2>/dev/null \
            | openssl ec -outform PEM 2>/dev/null \
            | openssl pkcs8 -topk8 -nocrypt -out AuthKey.p8 2>/dev/null \
            || cp AuthKey_raw.p8 AuthKey.p8

          echo "密钥转换完成"

          python3 << 'PYEOF'
          import json, os

          with open('AuthKey.p8', 'r') as f:
              key_content = f.read()

          data = {
              "key_id": os.environ['ASC_KEY_ID'],
              "issuer_id": os.environ['ASC_ISSUER_ID'],
              "key": key_content,
              "in_house": False
          }

          with open('api_key.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("api_key.json 生成成功")
          PYEOF

      - name: Upload IPA
        run: |
          fastlane pilot upload \
            --ipa signed.ipa \
            --api_key_path api_key.json \
            --skip_waiting_for_build_processing true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-ipa
          path: signed.ipa
